#=========代理池爬取=========
#从FOFA搜索公开代理池服务（body="get all proxy from proxy pool"）
#对每个代理池请求/all接口获取已维护好的代理列表
poolQueryString = 'body="get all proxy from proxy pool"'
poolResultSize=10000 #FOFA搜索结果数（最大10000）

