name: Collect Proxies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Collect Proxies
        run: |
          sed "s/your-fofa-key/${{ secrets.FOFA_KEY }}/" config.toml > config_ci.toml
          go build -ldflags="-s -w" -o deadpool main.go
          ./deadpool -c config_ci.toml --collect-only
          echo "Collection done, proxies: $(wc -l < lastData.txt 2>/dev/null || echo 0)"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -s lastData.txt ]; then
            git add lastData.txt
            git commit -m "chore: update proxy list [skip ci] ($(date +%Y-%m-%d))" || echo "no changes"
            git push
          else
            echo "lastData.txt is empty or missing, skip commit"
          fi
