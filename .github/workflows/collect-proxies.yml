name: Collect Proxies

on:
  workflow_dispatch:          # 手动触发
  schedule:
    - cron: "0 */6 * * *"    # 每6小时自动运行

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # 最多30分钟

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Collect Proxies
        run: |
          # 写入 CI 配置（用 secrets 替换 key）
          sed "s/your-fofa-key/${{ secrets.FOFA_KEY }}/" config.toml > config_ci.toml
          # 编译运行（30分钟超时自动退出）
          go build -ldflags="-s -w" -o deadpool main.go
          timeout --preserve-status 1500 ./deadpool -c config_ci.toml || true
          echo "Collection finished, proxies found: $(wc -l < lastData.txt 2>/dev/null || echo 0)"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet lastData.txt; then
            git add lastData.txt
            git commit -m "chore: update proxy list [skip ci] ($(date +%Y-%m-%d))"
            git push
          else
            echo "lastData.txt unchanged, skip commit"
          fi
